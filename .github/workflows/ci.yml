name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: panel/package-lock.json

      - name: Ensure jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Rust Format Check
        run: make fmt-check

      - name: Rust Lint
        run: make lint

      - name: Rust Tests
        run: make test

      - name: TS Bindings Drift Check
        run: |
          if ! git diff --exit-code panel/src/generated/; then
            echo "::error::ts-rs generated bindings are out of date. Run 'cargo test' locally and commit panel/src/generated/ changes."
            exit 1
          fi

      - name: Panel Build
        run: make panel-build

      - name: Agent E2E
        run: make e2e
