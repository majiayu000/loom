name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve contract diff base
        run: |
          set -euo pipefail
          base_sha="$(git rev-parse HEAD^)"
          git cat-file -e "${base_sha}^{tree}"
          echo "LOOM_CONTRACT_DIFF_BASE=$base_sha" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Tool Versions
        run: |
          rustc --version
          cargo nextest --version
          bun --version

      - name: Check tag matches Cargo version
        shell: bash
        run: |
          set -euo pipefail
          cargo_version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          test "v${cargo_version}" = "$GITHUB_REF_NAME"

      - name: Format
        run: make fmt-check

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Panel Install (Bun)
        run: cd panel && bun install --frozen-lockfile

      - name: Panel Typecheck (Bun)
        run: cd panel && bun run typecheck

      - name: Panel Tests (Bun)
        run: cd panel && bun run test

      - name: Panel Build (Bun)
        run: cd panel && bun run build

      - name: Agent E2E
        run: make e2e

      - name: Performance Smoke
        run: make perf-smoke

      - name: Crate package dry-run
        run: cargo publish --dry-run --locked

  build-assets:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rustflags: -Cllvm-args=-enable-machine-outliner=always -Clink-arg=-Wl,--no-eh-frame-hdr
          - os: macos-15-intel
            target: x86_64-apple-darwin
            rustflags: ""
          - os: macos-15
            target: aarch64-apple-darwin
            rustflags: ""
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Build release binary
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive="skillloom-${version}-${{ matrix.target }}.tar.gz"
          staging="dist/skillloom-${version}-${{ matrix.target }}"
          contract_root="$(mktemp -d)"
          trap 'rm -rf "$contract_root"' EXIT
          contract_version="$(
            "target/${{ matrix.target }}/release/loom" \
              --json --root "$contract_root" workspace status \
              | python3 -c 'import json, sys; value = json.load(sys.stdin).get("cli_contract_version"); isinstance(value, str) and value or sys.exit("binary returned no CLI contract version"); print(value)'
          )"
          python3 scripts/release-contract.py publish \
            --binary "target/${{ matrix.target }}/release/loom" \
            --skill-dir skills/loom-registry \
            --inventory docs/agent-command-surfaces.toml \
            --output-dir "$staging" \
            --release-version "$version" \
            --contract-version "$contract_version" \
            --target "${{ matrix.target }}" \
            --extra README.md \
            --extra LICENSE
          tar -C dist -czf "dist/$archive" "skillloom-${version}-${{ matrix.target }}"
          (cd dist && shasum -a 256 "$archive" > "$archive.sha256")

      - name: Smoke packaged binary
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive="skillloom-${version}-${{ matrix.target }}.tar.gz"
          unpack="$(mktemp -d)"
          tar -C "$unpack" -xzf "dist/$archive"
          bin="$unpack/skillloom-${version}-${{ matrix.target }}/loom"
          skill="$unpack/skillloom-${version}-${{ matrix.target }}/skills/loom-registry"
          bundle="$unpack/skillloom-${version}-${{ matrix.target }}"
          python3 scripts/release-contract.py verify --bundle "$bundle"
          test -f "$bundle/contracts/agent-command-surfaces.toml"
          test -f "$bundle/contract-manifest.json"
          test -f "$skill/SKILL.md"
          test -f "$skill/agents/openai.yaml"
          test -f "$skill/loom.skill.toml"
          test -f "$skill/evals/triggers.jsonl"
          "$bin" --version
          "$bin" --help >/dev/null
          smoke_root="$(mktemp -d)"
          status="$("$bin" --json --root "$smoke_root" workspace status)"
          STATUS="$status" MANIFEST="$bundle/contract-manifest.json" python3 - <<'PY'
          import json, os
          status = json.loads(os.environ["STATUS"])
          manifest = json.load(open(os.environ["MANIFEST"], encoding="utf-8"))
          assert status["cli_contract_version"] == manifest["cli_contract_version"]
          PY
          LOOM_PACKAGED_CONTRACT_BUNDLE="$bundle" \
            LOOM_PACKAGED_BINARY="$bin" \
            cargo test --test release_contract packaged_surface_fixture_matrix -- --ignored --exact
          "$bin" --root "$smoke_root" panel --port 0 >/tmp/loom-panel-smoke.log 2>&1 &
          panel_pid="$!"
          sleep 1
          if ! kill -0 "$panel_pid" 2>/dev/null; then
            cat /tmp/loom-panel-smoke.log
            wait "$panel_pid"
          fi
          kill "$panel_pid"
          wait "$panel_pid" 2>/dev/null || true

      - name: Attest release archive
        uses: actions/attest@v4
        with:
          subject-path: dist/*.tar.gz

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: skillloom-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  github-release:
    needs: build-assets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create checksums file
        shell: bash
        run: |
          set -euo pipefail
          cat release-assets/*.sha256 > release-assets/SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            release-assets/*.tar.gz \
            release-assets/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "Loom ${GITHUB_REF_NAME}" \
            --notes "Release ${GITHUB_REF_NAME}."

  crates-io:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Skip when crates.io token is not configured
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publish."

      - name: Checkout
        if: env.CARGO_REGISTRY_TOKEN != ''
        uses: actions/checkout@v7

      - name: Setup Rust
        if: env.CARGO_REGISTRY_TOKEN != ''
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        if: env.CARGO_REGISTRY_TOKEN != ''
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Publish crate
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish --locked

  homebrew-tap:
    needs: github-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      TAP_REPO: majiayu000/homebrew-tap
    steps:
      - name: Skip when Homebrew tap token is not configured
        if: env.HOMEBREW_TAP_TOKEN == ''
        run: echo "HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew tap PR."

      - name: Download release assets
        if: env.HOMEBREW_TAP_TOKEN != ''
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Checkout Homebrew tap
        if: env.HOMEBREW_TAP_TOKEN != ''
        uses: actions/checkout@v7
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        if: env.HOMEBREW_TAP_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          version="${tag#v}"
          base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"
          arm_archive="skillloom-${version}-aarch64-apple-darwin.tar.gz"
          intel_archive="skillloom-${version}-x86_64-apple-darwin.tar.gz"
          arm_sha="$(shasum -a 256 "release-assets/${arm_archive}" | awk '{print $1}')"
          intel_sha="$(shasum -a 256 "release-assets/${intel_archive}" | awk '{print $1}')"
          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/loom.rb <<FORMULA
          class Loom < Formula
            desc "Git-backed skill manager and registry for AI coding agents"
            homepage "https://github.com/majiayu000/loom"
            version "${version}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${base_url}/${arm_archive}"
                sha256 "${arm_sha}"
              else
                url "${base_url}/${intel_archive}"
                sha256 "${intel_sha}"
              end
            end

            def install
              pkgshare.install "loom"
              pkgshare.install "skills"
              pkgshare.install "contracts"
              pkgshare.install "contract-manifest.json"
              bin.install_symlink pkgshare/"loom"
            end

            test do
              assert_match "Skill manager", shell_output("#{bin}/loom --help")
            end
          end
          FORMULA

      - name: Open Homebrew tap PR
        if: env.HOMEBREW_TAP_TOKEN != ''
        working-directory: homebrew-tap
        env:
          GH_TOKEN: ${{ env.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          branch="loom-${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          formula="$(mktemp)"
          cp Formula/loom.rb "$formula"
          if git ls-files --error-unmatch -- Formula/loom.rb >/dev/null 2>&1; then
            git restore -- Formula/loom.rb
          else
            rm -f Formula/loom.rb
          fi
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null; then
            git fetch origin "refs/heads/$branch:refs/remotes/origin/$branch"
            git checkout -B "$branch" "origin/$branch"
          else
            git checkout -B "$branch"
          fi
          install -m 0644 "$formula" Formula/loom.rb
          rm -f "$formula"
          git add Formula/loom.rb
          if ! git diff --cached --quiet; then
            git commit -m "Update loom to ${GITHUB_REF_NAME}"
            git push origin "HEAD:refs/heads/$branch"
          fi
          git fetch origin "refs/heads/main:refs/remotes/origin/main"
          if git diff --quiet "origin/main" -- Formula/loom.rb; then
            exit 0
          else
            formula_diff_status=$?
            if [[ "$formula_diff_status" -ne 1 ]]; then
              exit "$formula_diff_status"
            fi
          fi
          pr_number="$(gh pr list --repo "$TAP_REPO" --head "$branch" --base main --state open --json number --jq '.[0].number')"
          if [[ -z "$pr_number" ]]; then
            gh pr create \
              --repo "$TAP_REPO" \
              --head "$branch" \
              --base main \
              --title "Update loom to ${GITHUB_REF_NAME}" \
              --body "Updates the loom formula for ${GITHUB_REF_NAME}."
          fi
