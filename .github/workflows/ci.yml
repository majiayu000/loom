name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve contract diff base
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          test -n "$BASE_SHA"
          test "$BASE_SHA" != "0000000000000000000000000000000000000000"
          git fetch --no-tags origin "$BASE_SHA"
          git cat-file -e "${BASE_SHA}^{tree}"
          echo "LOOM_CONTRACT_DIFF_BASE=$BASE_SHA" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Tool Versions
        run: |
          rustc --version
          cargo nextest --version
          bun --version

      - name: Ensure jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Rust Format Check
        run: make fmt-check

      - name: Rust Lint
        run: make lint

      - name: Module Ceiling
        run: make module-ceiling module-ceiling-test

      - name: Rust Tests
        run: make test

      - name: TS Bindings Drift Check
        run: |
          if ! git diff --exit-code panel/src/generated/; then
            echo "::error::ts-rs generated bindings are out of date. Run 'cargo test' locally and commit panel/src/generated/ changes."
            exit 1
          fi

      - name: Panel Install (Bun)
        run: cd panel && bun install --frozen-lockfile

      - name: Panel Typecheck (Bun)
        run: cd panel && bun run typecheck

      - name: Panel Tests (Bun)
        run: cd panel && bun run test

      - name: Panel Build (Bun)
        run: cd panel && bun run build

      - name: Agent E2E
        run: make e2e

      - name: Performance Smoke
        run: make perf-smoke
