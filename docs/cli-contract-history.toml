schema_version = 1

[[contract]]
version = "1.0.0"
skill_range = ">=1.0.0,<2.0.0"
change = "initial versioned agent-facing CLI contract"
migration_note = "Install the Loom binary and shipped loom-registry Skill from the same release archive."

[[contract]]
version = "1.1.0"
skill_range = ">=1.0.0,<2.0.0"
change = "snapshot structured error-code values and next-action item fields"
migration_note = "Clients can now inspect the complete public error-code set and next-action cmd/reason fields from the capability inventory."

[[contract]]
version = "1.2.0"
skill_range = ">=1.0.0,<2.0.0"
change = "add observable Gemini projection recovery guidance to the agent-facing capability inventory"
migration_note = "Clients may now observe the structured recovery action emitted when a Gemini alias shadows Loom's native projection; existing 1.x clients remain compatible."

[[contract]]
version = "1.3.0"
skill_range = ">=1.0.0,<2.0.0"
change = "add immutable Skill convergence planning and reviewed plan digest confirmation"
migration_note = "Clients may create plan converge records, but must treat execution_enabled=false as a hard apply blocker until a later contract enables the convergence executor."

[[contract]]
version = "1.3.0"
skill_range = ">=1.0.0,<2.0.0"
change = "add local Claude and Codex telemetry ingest planning and durable import surfaces"
migration_note = "Clients may invoke telemetry ingest after enabling telemetry; existing telemetry commands and shipped Skill compatibility remain unchanged."

[[contract]]
version = "1.4.0"
skill_range = ">=1.0.0,<2.0.0"
change = "reconcile concurrent additive convergence planning and telemetry ingest contracts"
migration_note = "Clients may use both convergence planning and telemetry ingest; all earlier 1.x surfaces remain compatible."

[[contract]]
version = "1.5.0"
skill_range = ">=1.0.0,<2.0.0"
change = "add read-only skill lifecycle statistics joining current bindings and normalized telemetry usage"
migration_note = "Clients may consume skill stats counters and lifecycle categories; existing 1.x commands and fields remain compatible."
